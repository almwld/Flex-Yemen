name: flex_yemen
description: Flex Yemen - منصة التجارة الإلكترونية اليمنية
version: 1.0.0+1
publish_to: none

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.6
  provider: ^6.1.1
  supabase_flutter: ^2.0.0
  carousel_slider: ^5.1.2
  flutter_animate: ^4.3.0
  flutter_svg: ^2.0.17
  image_picker: ^1.0.7
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  url_launcher: ^6.2.2
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  path_provider: ^2.1.5
  geolocator: ^11.1.0
  geocoding: ^3.0.0
  flutter_map: ^6.1.0
  latlong2: ^0.9.0
  flutter_dotenv: ^5.1.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
  connectivity_plus: ^6.0.3
  local_auth: ^2.3.0
  qr_flutter: ^4.1.0
  share_plus: ^10.1.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  flutter_launcher_icons: ^0.13.1
  flutter_native_splash: ^2.4.0

flutter:
  uses-material-design: true
  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600
  assets:
    - .env
    - assets/images/
    - assets/icons/svg/
    - assets/animations/

flutter_native_splash:
  color: "#D4AF37"
  image: assets/icons/logo.png
  android: true
  ios: true
  fullscreen: true

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#D4AF37"
  adaptive_icon_foreground: "assets/icons/app_icon_foreground.png"
