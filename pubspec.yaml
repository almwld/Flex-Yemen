name: flex_yemen
description: Flex Yemen - منصة التجارة الإلكترونية اليمنية
version: 1.0.0+1
publish_to: none
environment:
  sdk: ">=3.0.0 <4.0.0"
dependencies:
  flutter:
    sdk: flutter
  provider: ^6.1.1
  supabase_flutter: ^2.0.0
  carousel_slider: ^5.1.2
  flutter_animate: ^4.3.0
  cached_network_image: ^3.3.1
  shared_preferences: ^2.2.2
  intl: ^0.18.1
  flutter_dotenv: ^5.1.0
  shimmer: ^3.0.0
  smooth_page_indicator: ^1.1.0
  connectivity_plus: ^6.0.3
  share_plus: ^10.1.4
  url_launcher: ^6.2.2
  flutter_screenutil: ^5.9.0
  google_fonts: ^6.1.0
flutter:
  uses-material-design: true
  fonts:
    - family: Changa
      fonts:
        - asset: assets/fonts/Changa-SemiBold.ttf
          weight: 600
  assets:
    - .env
    - assets/images/
