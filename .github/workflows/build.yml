name: Build Flex Yemen APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.22.0'
          channel: 'stable'
      
      - name: Get dependencies
        run: flutter pub get
      
      - name: Create .env file
        run: |
          echo "SUPABASE_URL=https://ziqpohdxtemsmunnhlkm.supabase.co" > .env
          echo "SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InppcXBvaGR4dGVtc211bm5obGttIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzE3ODQzNDcsImV4cCI6MjA4NzM2MDM0N30.ABAg5YZSrrAtBTWATJ3eRTmo4BuZVyVlrMV1HZjRWs0" >> .env
          echo "MAP_API_KEY=efbc36e3-fdd1-428c-a96d-0dd8038fadb1" >> .env
      
      - name: Build APK
        run: flutter build apk --release --split-per-abi
      
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: flex-yemen-apks
          path: build/app/outputs/flutter-apk/*.apk
          retention-days: 30
